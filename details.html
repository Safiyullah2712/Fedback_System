<!DOCTYPE html>
<html>
<head>
    <title>All Feedbacks</title>
    <style>
        body {
            font-family: Arial;
            background: #dfe8f3;
            padding: 20px;
        }
        .page-header {
            margin-bottom: 25px;
        }

        .page-header h2 {
            margin: 0;
            font-size: 24px;
            color: #222;
        }

        .page-header p {
            margin: 5px 0 0;
            color: rgb(73, 73, 73);
            font-size: 14px;
        }
        
        .feedback-container {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .card-header h3 {
            margin: 0;
            font-size: 18px;
            color: #333;
        }

        .date {
            font-size: 12px;
            color: gray;
        }

        .rating {
            font-size: 18px;
            color: orange;
            margin-bottom: 10px;
        }

        .description {
            font-size: 14px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .edit-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .filter-container {
            display: flex;
            align-items: center;   
            gap: 10px;             
            margin-bottom: 20px;
        }
        .filter-container p {
            margin: 0;
            font-size: 20px;
            
        }
        .filter-container button {
            background: whitesmoke;
            color: black;
            border: 2px solid black;
            padding: 10px 15px;
            margin-right: 10px;
            border-radius: 5px;
            font-size: 20px;
            cursor: pointer;
        }

        .filter-container button:hover {
            background: rgb(238, 229, 211);
            
        }

        .filter-container button.active {
            background: rgb(236, 205, 147);
            color: black;
        }

        #add-new-btn {
            margin-left: 20px;
            background: rgb(95, 109, 187);
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
        }
        #add-new-btn:hover {
            background: rgb(95, 82, 190);
        }
    </style>
</head>
<body>


<div class="page-header">
    <h2>Customer Feedback Dashboard</h2>
    <p>Review and edit the submitted feedback entries</p>
</div>
<div class="filter-container">
    <label for="ratingFilter">Filter by Rating:</label>

    <select id="ratingFilter" onchange="applyFilter(this.value)">
        <option value="all" selected>All</option>
        <option value="1">1 Star</option>
        <option value="2">2 Stars</option>
        <option value="3">3 Stars</option>
        <option value="4">4 Stars</option>
        <option value="5">5 Stars</option>
    </select>
    <button id="add-new-btn" onclick="location.href='form.html'">+Add</button>
</div>
<div id="feedbackContainer" class="feedback-container"></div>

<script src="details.js"></script>

</body>
</html>
